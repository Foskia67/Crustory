<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crustory Menu</title>
<style>
body {
    margin:0;
    font-family: Verdana, sans-serif;
    background:#f4efe6;
}
/* HEADER */
header {
    background:#2b1d17;
    color:white;
    text-align:center;
    padding:15px;
}
header img {
    width:100px;
    height:auto;
    margin-bottom:10px;
}
/* NAV */
nav {
    background:#4a3228;
    padding:10px;
    text-align:center;
}
nav a {
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}
nav a:hover {
    color:orange;
}
/* MENU LIST */
section {
    padding:30px;
    display:flex;
    flex-wrap: wrap;
    justify-content:center;
}
.box {
    background:white;
    padding:15px;
    margin:15px;
    border-radius:10px;
    width:200px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
.box img {
    width:160px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:8px;
}
.box h3 {
    margin:8px 0 4px 0;
    font-size:18px;
}
/* FOOTER */
footer {
    background:#2b1d17;
    color:white;
    text-align:center;
    padding:10px;
}
</style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="Crustory Logo">
    <h1>Crustory Menu</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="Manga.html">Manga</a>
    <a href="login.html">Login</a>
</nav>

    <div class="box">
        <img src="Latte.jpg"alt="Latte">
        <h3>Latte</h3>
    </div>
    <div class="box">
        <img src="Americano.jpg"alt="Americano">
        <h3>Americano</h3>
    </div>
    <div class="box">
        <img src="Matcha.jpg" alt="Matcha">
        <h3>Matcha</h3>
    </div>
    <div class="box">
        <img src="Milktea.jpg" alt="Milk Tea">
        <h3>Milk Tea</h3>
    </div>

    <!-- Breads -->
    <div class="box">
        <img src="Pandesal.jpg" alt="Pandesal">
        <h3>Pandesal</h3>
    </div>
    <div class="box">
        <img src="Spanish Bread.jpg" alt="Spanish Bread">
        <h3>Spanish Bread</h3>
    </div>
    <div class="box">
        <img src="Cheese Bread.jpg" alt="Cheese Bread">
        <h3>Cheese Bread</h3>
    </div>
    <div class="box">
        <img src="Cinnamon Rolls.jpg" alt="Cinnamon Roll">
        <h3>Cinnamon Rolls</h3>
    </div>

    <!-- Meals -->
    <div class="box">
        <img src="Carbonara.jpg" alt="Carbonara">
        <h3>Carbonara</h3>
    </div>
    <div class="box">
        <img src="Chicken Alfredo.jpg" alt="Chicken Alfredo">
        <h3>Chicken Alfredo</h3>
    </div>
    <div class="box">
        <img src="Sandwich.jpg" alt="Sandwich">

    </div>
    <div class="box">
        <img src="Pizza.jpg" alt="Pizza">

</section>

<footer>
    © 2026 Crustory Café
</footer>

</body>
</html>
